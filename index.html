<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Responsive Image Gallery</h1>

<div class="buttons">
<button onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('nature')">Nature</button>
<button onclick="filterSelection('city')">City</button>
<button onclick="filterSelection('animals')">Animals</button>
</div>

<div class="gallery">

<img src="https://picsum.photos/id/1018/400/300" class="nature" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1015/400/300" class="nature" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1011/400/300" class="nature" onclick="openLightbox(this)">

<img src="https://picsum.photos/id/1043/400/300" class="city" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1031/400/300" class="city" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1025/400/300" class="city" onclick="openLightbox(this)">

<img src="https://picsum.photos/id/237/400/300" class="animals" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/593/400/300" class="animals" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/659/400/300" class="animals" onclick="openLightbox(this)">

</div>

<div id="lightbox">

<span class="close" onclick="closeLightbox()">&times;</span>

<button class="prev" onclick="changeImage(-1)">❮</button>

<img id="lightbox-img">

<button class="next" onclick="changeImage(1)">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
